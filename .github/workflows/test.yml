name: GuardGraph tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install -e .[dev]
      - name: Run tests
        run: pytest -q
      - name: Run GuardGraph demo
        run: python -m guardgraph.cli tests/test_app -o guardgraph_report.json
      - name: Print GuardGraph report in logs
        run: |
          echo "===== GUARDGRAPH REPORT ====="
          cat guardgraph_report.json
      - name: Add GuardGraph summary
        run: |
          echo "# GuardGraph report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat guardgraph_report.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload GuardGraph report
        uses: actions/upload-artifact@v4
        with:
          name: guardgraph-report
          path: guardgraph_report.json
